services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shri-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shri_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shri_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
