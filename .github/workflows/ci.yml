name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: manishh
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shri_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: "ci-only-placeholder-auth-secret-at-least-32-chars"
      DATABASE_URL: "postgresql://manishh:password@localhost:5432/shri_ai?schema=public"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Apply Migrations
        run: npx prisma migrate deploy

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: DB Readiness Check
        run: npm run db:ready
