name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  caddy-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.8.4-alpine \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: manishh
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shri_ai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: "ci-only-placeholder-auth-secret-at-least-32-chars"
      DATABASE_URL: "postgresql://manishh:password@localhost:5432/shri_ai_ci?schema=public"
      TEST_DATABASE_URL: "postgresql://manishh:password@localhost:5432/shri_ai_ci?schema=public"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency Audit
        run: npm audit --audit-level=high

      - name: Secret Containment Check
        run: npm run secrets:check

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Test Database URL Preflight
        run: npm run test:db:preflight

      - name: Apply Migrations
        run: npx prisma migrate deploy

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build:ci

      - name: DB Readiness Check
        run: npm run db:ready

      - name: Validate Scriptures
        run: npm run scripture:validate
